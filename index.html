<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloud Phone BD – Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--c1:#00e5ff;--c2:#0066ff;--c3:#7c3aff;--gold:#ffd700;--orange:#ff6a00;}
html,body{width:100%;min-height:100vh;background:#00050f;font-family:'Rajdhani',sans-serif;overflow-x:hidden;display:flex;align-items:center;justify-content:center;}

/* BG */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-grad{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(0,100,255,0.25) 0%,transparent 60%),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(124,58,255,0.2) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 10% 70%,rgba(0,229,255,0.15) 0%,transparent 60%),#00050f;}
.aurora{position:absolute;top:-100px;left:-100px;width:900px;height:600px;background:conic-gradient(from 0deg at 50% 50%,rgba(0,229,255,0.12) 0%,rgba(0,100,255,0.08) 25%,rgba(124,58,255,0.1) 50%,rgba(0,229,255,0.08) 75%,rgba(0,229,255,0.12) 100%);filter:blur(60px);border-radius:50%;animation:auroraMove 12s ease-in-out infinite alternate;}
@keyframes auroraMove{0%{transform:translate(0,0) rotate(0deg);}100%{transform:translate(200px,100px) rotate(40deg);}}
#starCanvas{position:absolute;inset:0;width:100%;height:100%;}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,229,255,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.04) 1px,transparent 1px);background-size:50px 50px;animation:gridScroll 20s linear infinite;}
@keyframes gridScroll{to{background-position:50px 50px;}}
.orb{position:absolute;border-radius:50%;filter:blur(40px);animation:orbFloat var(--dur,8s) ease-in-out infinite alternate;}
.orb1{width:250px;height:250px;background:rgba(0,102,255,0.18);top:5%;left:-5%;--dur:9s;}
.orb2{width:200px;height:200px;background:rgba(124,58,255,0.15);bottom:10%;right:-5%;--dur:11s;}
.orb3{width:150px;height:150px;background:rgba(0,229,255,0.12);top:40%;right:10%;--dur:7s;}
@keyframes orbFloat{from{transform:translateY(0) scale(1);}to{transform:translateY(-40px) scale(1.1);}}
.shoot{position:absolute;height:2px;background:linear-gradient(90deg,transparent,var(--c1),transparent);border-radius:2px;animation:shoot var(--ds,3s) linear infinite;opacity:0;top:var(--t,20%);left:-200px;width:var(--w,200px);}
@keyframes shoot{0%{transform:translateX(0) rotate(-15deg);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateX(110vw) rotate(-15deg);opacity:0;}}

/* CARD */
.wrapper{position:relative;z-index:10;padding:20px;}
.card{position:relative;width:520px;background:linear-gradient(145deg,rgba(5,20,50,0.92) 0%,rgba(2,10,30,0.97) 100%);border-radius:32px;padding:44px 40px 36px;text-align:center;overflow:hidden;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.card-border{position:absolute;inset:0;border-radius:32px;padding:2px;background:conic-gradient(from 0deg,transparent 0%,var(--c1) 10%,var(--c2) 20%,var(--c3) 30%,transparent 40%,transparent 60%,var(--c3) 70%,var(--c2) 80%,var(--c1) 90%,transparent 100%);animation:rotateBorder 3s linear infinite;-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;}
@keyframes rotateBorder{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:conic-gradient(from 0deg,transparent 0%,rgba(0,229,255,0.05) 20%,transparent 40%);animation:innerSpin 8s linear infinite;pointer-events:none;}
@keyframes innerSpin{to{transform:rotate(360deg);}}
.card::after{content:'';position:absolute;top:0;left:20%;width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--c1),#fff,var(--c1),transparent);animation:topBar 2s ease-in-out infinite alternate;pointer-events:none;}
@keyframes topBar{from{opacity:0.5;}to{opacity:1;}}

/* LOGO */
.logo-section{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:28px;animation:fadeDown 0.8s ease both;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
.logo-ring{position:relative;width:110px;height:110px;flex-shrink:0;}
.logo-ring-outer{position:absolute;inset:0;border-radius:50%;border:2px solid rgba(0,229,255,0.6);animation:spinRing 4s linear infinite;box-shadow:0 0 20px rgba(0,229,255,0.3);}
.logo-ring-outer2{position:absolute;inset:4px;border-radius:50%;border:1px dashed rgba(0,229,255,0.3);animation:spinRing 8s linear infinite reverse;}
@keyframes spinRing{to{transform:rotate(360deg);}}
.logo-ring-inner{position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#1a8fff 0%,#0047cc 45%,#00245a 100%);box-shadow:0 0 30px rgba(0,229,255,0.5),inset 0 0 20px rgba(0,100,255,0.3);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.logo-glow{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:80px;height:20px;background:radial-gradient(ellipse,rgba(0,229,255,0.6),transparent 70%);filter:blur(4px);}

.brand{text-align:left;line-height:1.15;}
.brand-line1{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;background:linear-gradient(135deg,#00e5ff,#80f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px rgba(0,229,255,0.6));}
.brand-line2{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#fff;text-shadow:0 0 15px rgba(255,255,255,0.3);}
.brand-line3{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#ffd700,#ffaa00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldPulse 2s ease-in-out infinite alternate;}
@keyframes goldPulse{from{filter:drop-shadow(0 0 8px rgba(255,200,0,0.5));}to{filter:drop-shadow(0 0 16px rgba(255,200,0,0.9));}}

/* DIVIDER */
.divider{height:1px;margin:0 -40px 28px;background:linear-gradient(90deg,transparent,var(--c1),var(--gold),var(--c1),transparent);position:relative;}
.divider::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:8px;height:8px;background:var(--c1);border-radius:50%;box-shadow:0 0 10px var(--c1),0 0 20px var(--c1);animation:centerDot 2s ease-in-out infinite alternate;}
@keyframes centerDot{from{transform:translateX(-50%) scale(1);}to{transform:translateX(-50%) scale(1.6);}}

/* BADGE */
.badge-wrap{display:flex;justify-content:center;gap:10px;margin-bottom:18px;animation:fadeUp 0.9s 0.2s ease both;}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 18px;border-radius:30px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;}
.badge-new{background:linear-gradient(135deg,#ff6a00,#ffd700);color:#000;box-shadow:0 0 20px rgba(255,150,0,0.5);animation:badgePulse 1.8s ease-in-out infinite alternate;}
@keyframes badgePulse{from{transform:scale(1);}to{transform:scale(1.06);box-shadow:0 0 30px rgba(255,150,0,0.9);}}
.badge-update{background:transparent;border:1px solid rgba(0,229,255,0.5);color:var(--c1);box-shadow:0 0 12px rgba(0,229,255,0.2);}

/* COMING SOON */
.cs-wrap{margin-bottom:6px;animation:fadeUp 0.9s 0.3s ease both;}
.cs-sub{font-size:11px;letter-spacing:5px;color:rgba(150,220,255,0.7);text-transform:uppercase;margin-bottom:8px;}
.coming-soon{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;line-height:1;letter-spacing:3px;background:linear-gradient(135deg,#fff 0%,var(--c1) 40%,#fff 60%,var(--gold) 100%);background-size:300% 300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:csShimmer 4s linear infinite;}
@keyframes csShimmer{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
.cs-reflect{font-family:'Orbitron',sans-serif;font-size:40px;font-weight:900;letter-spacing:3px;background:linear-gradient(180deg,rgba(0,229,255,0.2),transparent);-webkit-background-clip:text;-webkit-text-fill-color:transparent;transform:scaleY(-0.35);filter:blur(1.5px);opacity:0.5;margin-top:2px;user-select:none;}

/* COUNTDOWN */
.cd-label{font-size:11px;letter-spacing:4px;color:rgba(130,200,255,0.6);text-transform:uppercase;margin:22px 0 14px;animation:fadeUp 0.9s 0.4s ease both;}
.countdown{display:flex;justify-content:center;gap:12px;margin-bottom:22px;animation:fadeUp 0.9s 0.5s ease both;}
.tbox{position:relative;background:linear-gradient(145deg,rgba(0,100,200,0.15),rgba(0,30,80,0.3));border:1px solid rgba(0,229,255,0.2);border-radius:16px;padding:16px 16px 12px;min-width:78px;overflow:hidden;transition:transform 0.2s;}
.tbox:hover{transform:translateY(-4px) scale(1.05);}
.tbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--c1),transparent);}
.tbox::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,229,255,0.08),transparent 60%);}
.tnum{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;background:linear-gradient(180deg,#fff,var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 8px var(--c1));line-height:1;display:block;position:relative;z-index:1;}
.tlbl{font-family:'Noto Sans Bengali',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(150,220,255,0.65);margin-top:5px;display:block;position:relative;z-index:1;}
.colon{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--c1);align-self:center;margin-top:-10px;animation:blink 1s step-end infinite;text-shadow:0 0 10px var(--c1);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}

/* PROGRESS */
.prog-wrap{background:rgba(0,229,255,0.06);border-radius:20px;height:8px;overflow:hidden;border:1px solid rgba(0,229,255,0.12);margin-bottom:8px;animation:fadeUp 0.9s 0.6s ease both;position:relative;}
.prog-bar{height:100%;width:0;border-radius:20px;background:linear-gradient(90deg,var(--c2),var(--c1),var(--gold));animation:fillBar 2.5s cubic-bezier(0.4,0,0.2,1) 0.6s forwards;position:relative;}
.prog-bar::after{content:'';position:absolute;top:0;right:0;width:30px;height:100%;background:rgba(255,255,255,0.5);filter:blur(6px);}
@keyframes fillBar{to{width:100%;}}

/* SUBTEXT */
.subtext{font-family:'Noto Sans Bengali',sans-serif;font-size:14px;line-height:1.8;color:rgba(180,225,255,0.7);margin-top:18px;animation:fadeUp 0.9s 0.7s ease both;}
.subtext span{color:var(--c1);font-weight:700;}

/* PARTICLES */
.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.p{position:absolute;border-radius:50%;background:var(--c1);animation:pFloat var(--pd,3s) ease-in var(--del,0s) infinite;box-shadow:0 0 4px var(--c1);}
@keyframes pFloat{0%{transform:translateY(0) scale(1);opacity:0.7;}100%{transform:translateY(-300px) translateX(var(--px,0px)) scale(0);opacity:0;}}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-grad"></div>
  <div class="aurora"></div>
  <canvas id="starCanvas"></canvas>
  <div class="grid"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="shoot" style="--t:15%;--w:180px;--ds:5s;animation-delay:0s"></div>
  <div class="shoot" style="--t:35%;--w:250px;--ds:7s;animation-delay:2s"></div>
  <div class="shoot" style="--t:60%;--w:140px;--ds:6s;animation-delay:4s"></div>
  <div class="shoot" style="--t:80%;--w:200px;--ds:8s;animation-delay:1s"></div>
</div>

<div class="wrapper">
<div class="card" id="card">
  <div class="card-border"></div>

  <div class="particles">
    <div class="p" style="width:4px;height:4px;bottom:5%;left:15%;--pd:2.8s;--del:0s;--px:20px"></div>
    <div class="p" style="width:3px;height:3px;bottom:5%;left:35%;--pd:3.5s;--del:0.5s;--px:-15px"></div>
    <div class="p" style="width:5px;height:5px;bottom:5%;left:55%;--pd:2.2s;--del:1.2s;--px:10px"></div>
    <div class="p" style="width:3px;height:3px;bottom:5%;left:75%;--pd:3.8s;--del:0.8s;--px:-20px"></div>
    <div class="p" style="width:4px;height:4px;bottom:5%;left:25%;--pd:4.2s;--del:2.3s;--px:-10px;background:#ffd700;box-shadow:0 0 4px #ffd700"></div>
    <div class="p" style="width:4px;height:4px;bottom:5%;left:65%;--pd:3.1s;--del:0.3s;--px:25px;background:#7c3aff;box-shadow:0 0 4px #7c3aff"></div>
    <div class="p" style="width:3px;height:3px;bottom:5%;left:88%;--pd:2.6s;--del:1.8s;--px:5px"></div>
  </div>

  <!-- LOGO -->
  <div class="logo-section">
    <div class="logo-ring">
      <div class="logo-ring-outer"></div>
      <div class="logo-ring-outer2"></div>
      <div class="logo-ring-inner">
        <svg style="position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:78px;" viewBox="0 0 100 55" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="38" rx="42" ry="14" fill="rgba(255,255,255,0.93)"/>
          <circle cx="32" cy="30" r="16" fill="rgba(255,255,255,0.93)"/>
          <circle cx="55" cy="24" r="20" fill="rgba(255,255,255,0.93)"/>
          <circle cx="72" cy="31" r="13" fill="rgba(255,255,255,0.93)"/>
        </svg>
        <svg style="position:relative;z-index:2;width:32px;margin-bottom:4px;filter:drop-shadow(0 2px 8px rgba(0,200,255,0.5));" viewBox="0 0 38 68" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="36" height="66" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
          <rect x="4" y="5" width="30" height="22" rx="3" fill="#0d3b6e"/>
          <rect x="5" y="6" width="8" height="8" rx="1.5" fill="#e91e63"/>
          <rect x="15" y="6" width="8" height="8" rx="1.5" fill="#ff9800"/>
          <rect x="25" y="6" width="8" height="8" rx="1.5" fill="#2196f3"/>
          <rect x="5" y="16" width="8" height="8" rx="1.5" fill="#4caf50"/>
          <rect x="15" y="16" width="8" height="8" rx="1.5" fill="#f44336"/>
          <rect x="25" y="16" width="8" height="8" rx="1.5" fill="#9c27b0"/>
          <rect x="4" y="5" width="30" height="22" rx="3" fill="rgba(0,180,255,0.1)"/>
          <rect x="5" y="31" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="15" y="31" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="25" y="31" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="5" y="39" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="15" y="39" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="25" y="39" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="5" y="47" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="15" y="47" width="8" height="6" rx="1.5" fill="#1a5c1a"/>
          <rect x="25" y="47" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="5" y="55" width="8" height="6" rx="1.5" fill="#3a1a1a"/>
          <rect x="15" y="55" width="8" height="6" rx="1.5" fill="#232345"/>
          <rect x="25" y="55" width="8" height="6" rx="1.5" fill="#3a1a1a"/>
        </svg>
      </div>
      <div class="logo-glow"></div>
    </div>
    <div class="brand">
      <div class="brand-line1">Cloud</div>
      <div class="brand-line2">Phone</div>
      <div class="brand-line3">BD</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="badge-wrap">
    <div class="badge badge-new">⚡ NEW UPDATE</div>
    <div class="badge badge-update">🚀 ARRIVING SOON</div>
  </div>

  <div class="cs-wrap">
    <div class="cs-sub">Cloud Phone BD presents</div>
    <div class="coming-soon">COMING SOON</div>
    <div class="cs-reflect">COMING SOON</div>
  </div>

  <div class="cd-label">⏳ &nbsp; কাউন্টডাউন শুরু &nbsp; ⏳</div>

  <div class="countdown">
    <div class="tbox">
      <span class="tnum" id="days">15</span>
      <span class="tlbl">দিন</span>
    </div>
    <div class="colon">:</div>
    <div class="tbox">
      <span class="tnum" id="hours">00</span>
      <span class="tlbl">ঘণ্টা</span>
    </div>
    <div class="colon">:</div>
    <div class="tbox">
      <span class="tnum" id="minutes">00</span>
      <span class="tlbl">মিনিট</span>
    </div>
    <div class="colon">:</div>
    <div class="tbox">
      <span class="tnum" id="seconds">00</span>
      <span class="tlbl">সেকেন্ড</span>
    </div>
  </div>

  <div class="prog-wrap"><div class="prog-bar"></div></div>
  <div style="font-size:10px;letter-spacing:2px;color:rgba(0,229,255,0.5);margin-bottom:0;">LOADING NEW EXPERIENCE... 100%</div>

  <p class="subtext">
    অসাধারণ কিছু আসছে! <span>অপেক্ষা করুন।</span><br>
    নতুন আপডেট আপনার অভিজ্ঞতা বদলে দেবে 🌟<br>
    <span>Cloud Phone BD</span> — সবসময় আপনার পাশে
  </p>
</div>
</div>

<script>
const canvas=document.getElementById('starCanvas');
const ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const stars=[];
for(let i=0;i<200;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*1.8+0.2,a:Math.random(),s:Math.random()*0.5+0.2,dir:Math.random()>0.5?1:-1});}
function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{s.a+=s.s*0.01*s.dir;if(s.a>1||s.a<0)s.dir*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();});requestAnimationFrame(drawStars);}
drawStars();

const target=new Date(Date.now()+15*24*60*60*1000);
function pad(n){return String(n).padStart(2,'0');}
function tick(){const diff=Math.max(0,target-Date.now());document.getElementById('days').textContent=pad(Math.floor(diff/86400000));document.getElementById('hours').textContent=pad(Math.floor(diff%86400000/3600000));document.getElementById('minutes').textContent=pad(Math.floor(diff%3600000/60000));document.getElementById('seconds').textContent=pad(Math.floor(diff%60000/1000));}
tick();setInterval(tick,1000);

const card=document.getElementById('card');
document.addEventListener('mousemove',e=>{const cx=window.innerWidth/2,cy=window.innerHeight/2;const rx=(e.clientY-cy)/cy*6;const ry=(e.clientX-cx)/cx*-6;card.style.transform=`perspective(1000px) rotateX(${rx}deg) rotateY(${ry}deg)`;card.style.transition='transform 0.1s ease';});
document.addEventListener('mouseleave',()=>{card.style.transform='perspective(1000px) rotateX(0) rotateY(0)';card.style.transition='transform 0.5s ease';});
</script>
</body>
</html>
